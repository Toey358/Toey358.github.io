<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Vocabulary Flashcard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="https://img.icons8.com/parakeet/96/book.png">
    <link rel="apple-touch-icon" href="path_to_your_icon/icon.png">
</head>
<body>
    <div class="card-container">
        <div class="card" id="flashcard" onclick="flipCard()">
           
            <div class="front" id="frontCard">
                <div id="frontWord"></div>
                <div id="frontCounter" class="word-counter"></div>
                <button id="likeButton" onclick="likeWord(event)">Like</button>
            </div>
            <div class="back" id="backCard">
                <div id="backWord"></div>
                <div id="backCounter" class="word-counter"></div>
            </div>
        </div>
    </div>
    
    <div class="button-container">
        <button class="button" id="prevButton" onclick="getPreviousWord()"></button>
        <button class="button" id="nextButton" onclick="getNextWord()"></button>
    </div>
    <script src="script.js"></script>
</body>
</html>
